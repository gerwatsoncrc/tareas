<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f8;
  --muted: rgba(240,240,248,0.45);
  --accent: #7c6ff7;
  --accent-dim: rgba(124,111,247,0.18);
  --accent-glow: rgba(124,111,247,0.28);
  --accent2: #4ecdc4;
  --red: #ff6b6b;
  --amber: #ffc857;
  --green: #51e27a;
  --r: 16px;
  --r-sm: 10px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 20px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease, transform .22s ease;
  transform: translateX(20px);
}
.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0);
}
.screen.slide-left {
  transform: translateX(-20px);
  opacity: 0;
  pointer-events: none;
}

/* ── HOME ── */
#home { background: var(--bg); }

.home-header {
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}
.home-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.home-date { font-size: 13px; color: var(--muted); margin-top: 3px; }

.sync-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  padding-top: 4px;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.sync-dot.syncing { background: var(--amber); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

.stats-row {
  display: flex;
  gap: 8px;
  padding: 0 20px 16px;
  flex-shrink: 0;
  overflow-x: auto;
}
.stat-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  flex-shrink: 0;
  text-align: center;
}
.stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

.filter-row {
  display: flex;
  gap: 8px;
  padding: 0 20px 12px;
  overflow-x: auto;
  flex-shrink: 0;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: inherit;
  transition: all .15s;
}
.filter-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.tasks-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 4px 16px calc(var(--safe-bot) + 90px);
  -webkit-overflow-scrolling: touch;
}
.tasks-scroll::-webkit-scrollbar { display: none; }

.proj-group { margin-bottom: 22px; }
.proj-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 4px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.proj-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.task-item {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  padding: 13px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 11px;
  transition: border-color .15s, opacity .2s;
}
.task-item.fading { opacity: 0; }

.task-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .18s;
}
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-check.done::after {
  content: '';
  width: 5px;
  height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
  display: block;
  margin-top: -1px;
}

.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 15px; font-weight: 400; line-height: 1.4; word-break: break-word; }
.task-name.done { text-decoration: line-through; color: var(--muted); }

.task-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
.chip {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 7px;
  letter-spacing: 0.2px;
  font-family: 'SF Mono', 'Menlo', monospace;
}
.chip-alta { background: rgba(255,107,107,.12); color: #ff9090; }
.chip-media { background: rgba(255,200,87,.12); color: #ffd17a; }
.chip-baja { background: rgba(81,226,122,.12); color: #7beea0; }
.chip-date { background: rgba(78,205,196,.1); color: var(--accent2); }
.chip-date.over { background: rgba(255,107,107,.12); color: #ff9090; }
.chip-notes { background: var(--surface2); color: var(--muted); }

.cal-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(78,205,196,.1);
  border: 0.5px solid rgba(78,205,196,.25);
  color: var(--accent2);
  padding: 5px 11px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  margin-top: 8px;
  text-decoration: none;
  font-family: inherit;
}

.task-del {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 22px;
  line-height: 1;
  padding: 0 2px;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0.6;
}
.task-del:active { opacity: 1; color: var(--red); }

.empty-state {
  text-align: center;
  padding: 70px 24px;
  color: var(--muted);
  font-size: 15px;
  line-height: 2;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bot) + 20px);
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 400px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 8px 28px var(--accent-glow);
  transition: transform .12s, box-shadow .12s;
  z-index: 50;
}
.fab:active {
  transform: translateX(-50%) scale(0.97);
  box-shadow: 0 4px 14px var(--accent-glow);
}

/* ── CAPTURE SCREEN ── */
#capture { background: var(--bg); }

.cap-header {
  padding: calc(var(--safe-top) + 12px) 20px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
}
.back-btn {
  width: 36px;
  height: 36px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 18px;
}
.cap-title { font-size: 18px; font-weight: 600; }

.convo-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.convo-area::-webkit-scrollbar { display: none; }

.bubble {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: var(--r);
  font-size: 15px;
  line-height: 1.5;
  animation: popIn .18s ease;
}
.bubble.bot {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.bubble.user {
  background: var(--accent);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.bubble.success {
  background: rgba(81,226,122,.12);
  border: 0.5px solid rgba(81,226,122,.2);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #7beea0;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.95) translateY(5px); }
  to { opacity: 1; transform: none; }
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 14px 16px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  animation: popIn .18s ease;
}
.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce .8s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

.input-area {
  padding: 12px 20px calc(var(--safe-bot) + 16px);
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.quick-opts {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 10px;
  min-height: 0;
}
.qopt {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 7px 15px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  color: var(--text);
  transition: all .13s;
  white-space: nowrap;
}
.qopt:active { background: var(--accent); border-color: var(--accent); color: #fff; }

.input-row { display: flex; gap: 8px; align-items: center; }

.text-inp {
  flex: 1;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 12px 15px;
  font-size: 16px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
}
.text-inp::placeholder { color: var(--muted); }
.text-inp:focus { border-color: var(--accent); }

.icon-btn {
  width: 46px;
  height: 46px;
  border-radius: var(--r-sm);
  border: 0.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
  background: var(--surface);
}
.icon-btn.send { background: var(--accent); border-color: var(--accent); }
.icon-btn.voice.recording {
  background: rgba(255,107,107,.15);
  border-color: var(--red);
  animation: ring .7s infinite;
}
@keyframes ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.3); }
  50% { box-shadow: 0 0 0 7px rgba(255,107,107,0); }
}
.icon-btn:active { opacity: .7; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bot) + 100px);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  z-index: 200;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity .4s;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-icon { font-size: 48px; margin-bottom: 20px; }
.loader-bar {
  width: 120px;
  height: 3px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.loader-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  animation: fill 1.5s ease forwards;
}
@keyframes fill { from { width: 0; } to { width: 100%; } }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">

</div>

<!-- HOME -->
<div class="screen" id="home">

  </button>

  <div class="input-area">

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN — EDITÁ ESTAS DOS LÍNEAS
// ══════════════════════════════════════════════
const DRIVE_FILE_ID   = '1dB7vAukHIa7kpJCHPz9x-KOoGdPcf_et';
const ANTHROPIC_KEY   = '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';
// ══════════════════════════════════════════════

const PROJ_COLORS = ['#7c6ff7','#4ecdc4','#ffc857','#ff6b6b','#51e27a','#c77dff','#ff9f43','#a29bfe'];
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DAYS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

const STEPS = [
  { key:'title',    q:'¿Qué tarea querés agregar?',                        ph:'Ej: Llamar al contador...' },
  { key:'project',  q:'¿A qué proyecto o empresa pertenece?',              ph:'Ej: Empresa A, Personal...' },
  { key:'priority', q:'¿Qué prioridad le das?',                            opts:['🔴 Alta','🟡 Media','🟢 Baja'] },
  { key:'date',     q:'¿Para cuándo la necesitás?',                        opts:['Hoy','Mañana','Esta semana','Sin fecha'] },
  { key:'notes',    q:'¿Alguna nota o detalle? (opcional, podés saltar)',   ph:'Contexto, links, detalles...',  opts:['Saltar'] }
];

let tasks = [], step = 0, newTask = {}, activeFilter = 'todas';
let recognition = null, isRecording = false;

// ── DRIVE ────────────────────────────────────
async function callClaude(system, userMsg) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_KEY,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages: [{ role:'user', content: userMsg }],
      mcp_servers: [{ type:'url', url:'https://drivemcp.googleapis.com/mcp/v1', name:'gdrive' }]
    })
  });
  return res.json();
}

async function loadTasks() {
  setSyncing(true);
  try {
    const data = await callClaude(
      `Use the Google Drive MCP to read file with ID: ${DRIVE_FILE_ID}. Return ONLY the raw JSON array from the file. No markdown, no explanation. If empty return [].`,
      'Read the file and return its content as a JSON array.'
    );
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const start = clean.indexOf('[');
    if(start>=0) tasks = JSON.parse(clean.slice(start));
    else tasks = [];
  } catch(e) {
    tasks = JSON.parse(localStorage.getItem('tasks_bk')||'[]');
    showToast('Sin conexión — mostrando caché local');
  }
  setSyncing(false);
  localStorage.setItem('tasks_bk', JSON.stringify(tasks));
  renderHome();
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('home').classList.add('active');
}

async function saveTasks() {
  setSyncing(true);
  localStorage.setItem('tasks_bk', JSON.stringify(tasks));
  try {
    const json = JSON.stringify(tasks, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(json)));
    await callClaude(
      `Use the Google Drive MCP to update the file with ID: ${DRIVE_FILE_ID}. The new file content (base64 encoded JSON) is in the user message. Update the file with this content. Respond with just "ok".`,
      `Update file with this base64 content: ${b64}`
    );
    showToast('Guardado en Drive ✓');
  } catch(e) {
    showToast('Guardado localmente');
  }
  setSyncing(false);
}

function setSyncing(v) {
  document.getElementById('sync-dot').className = 'sync-dot' + (v?' syncing':'');
  document.getElementById('sync-lbl').textContent = v ? 'Sincronizando...' : 'Drive ✓';
}

// ── RENDER HOME ───────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function tomorrow() { return new Date(Date.now()+86400000).toISOString().split('T')[0]; }

function renderHome() {
  const d = new Date();
  document.getElementById('home-date').textContent =
    DAYS[d.getDay()] + ', ' + d.getDate() + ' de ' + ['enero','febrero','marzo','abril','mayo','junio',
    'julio','agosto','septiembre','octubre','noviembre','diciembre'][d.getMonth()];

  const pending = tasks.filter(t=>!t.done);
  const todayT  = tasks.filter(t=>!t.done && t.date===today());
  const done    = tasks.filter(t=>t.done);
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-today').textContent   = todayT.length;
  document.getElementById('stat-done').textContent    = done.length;

  // Filter tabs
  const projs = [...new Set(tasks.map(t=>t.project).filter(Boolean))];
  const tabs = ['todas','pendientes',...projs];
  document.getElementById('filter-row').innerHTML = tabs.map(t=>
    `<button class="filter-tab ${activeFilter===t?'active':''}" onclick="setFilter('${t.replace(/'/g,"\\'")}')">
      ${t.charAt(0).toUpperCase()+t.slice(1)}
    </button>`
  ).join('');

  // Filter tasks
  let filtered = tasks;
  if(activeFilter==='pendientes') filtered = tasks.filter(t=>!t.done);
  else if(activeFilter!=='todas') filtered = tasks.filter(t=>t.project===activeFilter);

  const scroll = document.getElementById('tasks-scroll');
  if(!filtered.length) {
    scroll.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎯</div>
      ${activeFilter==='todas'?'No hay tareas aún.<br>Presioná el botón para agregar una.':'No hay tareas en esta vista.'}
    </div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const po={alta:0,media:1,baja:2};
    if(po[a.priority]!==po[b.priority]) return (po[a.priority]||1)-(po[b.priority]||1);
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    return a.date?-1:1;
  });

  // Group by project
  const groups = {};
  sorted.forEach(t=>{
    const k=t.project||'Sin proyecto';
    if(!groups[k]) groups[k]=[];
    groups[k].push(t);
  });

  scroll.innerHTML = Object.entries(groups).map(([proj,ts])=>{
    const col = proj!=='Sin proyecto' ? projColor(proj) : '#555';
    return `<div class="proj-group">
      <div class="proj-label">
        <span class="proj-dot" style="background:${col}"></span>${proj}
      </div>
      ${ts.map(t=>taskHTML(t,col)).join('')}
    </div>`;
  }).join('');
}

function taskHTML(t, col) {
  const dl = fmtDate(t.date);
  const over = t.date && t.date<today() && !t.done;
  const calUrl = t.date
    ? `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.title)}&dates=${t.date.replace(/-/g,'')}/${t.date.replace(/-/g,'')}&details=${encodeURIComponent(t.notes||'')}`
    : null;
  return `<div class="task-item" id="ti-${t.id}">
    <div class="task-check ${t.done?'done':''}" onclick="toggleDone('${t.id}')"></div>
    <div class="task-body">
      <div class="task-name ${t.done?'done':''}">${escHtml(t.title)}</div>
      <div class="task-chips">
        ${t.priority?`<span class="chip chip-${t.priority}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>`:''}
        ${dl?`<span class="chip chip-date ${over?'over':''}">${over?'⚠ ':''}${dl}</span>`:''}
        ${t.notes?`<span class="chip chip-notes">📝 Nota</span>`:''}
      </div>
      ${calUrl&&!t.done?`<a class="cal-btn" href="${calUrl}" target="_blank">📅 Agendar en Calendar</a>`:''}
    </div>
    <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
  </div>`;
}

function setFilter(f) { activeFilter=f; renderHome(); }

function projColor(name) {
  const p=[...new Set(tasks.map(t=>t.project).filter(Boolean))];
  return PROJ_COLORS[p.indexOf(name)%PROJ_COLORS.length]||PROJ_COLORS[0];
}

function fmtDate(d) {
  if(!d) return null;
  if(d===today()) return 'Hoy';
  if(d===tomorrow()) return 'Mañana';
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${MONTHS[parseInt(m)-1]}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDone(id) {
  const t=tasks.find(t=>t.id===id);
  if(!t) return;
  t.done=!t.done;
  const el=document.getElementById('ti-'+id);
  if(el) el.classList.add('fading');
  setTimeout(()=>{ saveTasks(); renderHome(); }, 200);
}

function deleteTask(id) {
  const el=document.getElementById('ti-'+id);
  if(el) el.classList.add('fading');
  setTimeout(()=>{ tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderHome(); }, 200);
}

// ── CAPTURE FLOW ──────────────────────────────
function goCapture() {
  newTask={}; step=0;
  document.getElementById('convo').innerHTML='';
  document.getElementById('quick-opts').innerHTML='';
  document.getElementById('text-inp').value='';
  document.getElementById('cap-title').textContent='Nueva tarea';
  document.getElementById('home').classList.remove('active');
  document.getElementById('home').classList.add('slide-left');
  document.getElementById('capture').classList.add('active');
  setTimeout(askStep, 100);
}

function goHome() {
  if(isRecording) stopRecording();
  document.getElementById('capture').classList.remove('active');
  document.getElementById('home').classList.remove('slide-left');
  document.getElementById('home').classList.add('active');
}

function showTyping(cb) {
  const c=document.getElementById('convo');
  const el=document.createElement('div');
  el.className='typing-indicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  c.appendChild(el);
  c.scrollTop=c.scrollHeight;
  setTimeout(()=>{ el.remove(); cb(); },600);
}

function addBubble(text, who) {
  const c=document.getElementById('convo');
  const b=document.createElement('div');
  b.className=`bubble ${who}`;
  b.innerHTML=text;
  c.appendChild(b);
  c.scrollTop=c.scrollHeight;
}

function askStep() {
  const s=STEPS[step];
  if(!s) { finishTask(); return; }
  showTyping(()=>{
    addBubble(s.q,'bot');
    document.getElementById('text-inp').placeholder = s.ph||'Escribí o dictá...';
    renderOpts(s.opts||[]);
    document.getElementById('text-inp').focus();
  });
}

function renderOpts(opts) {
  document.getElementById('quick-opts').innerHTML =
    opts.map(o=>`<button class="qopt" onclick="selectOpt('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
}

function selectOpt(v) { addBubble(v,'user'); processAnswer(v); }

function sendText() {
  const inp=document.getElementById('text-inp');
  const v=inp.value.trim();
  if(!v) return;
  inp.value='';
  addBubble(escHtml(v),'user');
  processAnswer(v);
}

function processAnswer(val) {
  const s=STEPS[step];
  if(!s) return;
  document.getElementById('quick-opts').innerHTML='';

  const v = val.replace(/^[🔴🟡🟢]\s*/,'').trim();

  if(s.key==='date') {
    const vl=val.toLowerCase();
    if(vl==='hoy') newTask.date=today();
    else if(vl==='mañana') newTask.date=tomorrow();
    else if(vl==='esta semana') newTask.date=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
    else if(vl==='sin fecha') newTask.date='';
    else newTask.date=v;
  } else if(s.key==='priority') {
    newTask.priority=v.toLowerCase();
  } else if(s.key==='notes' && (v.toLowerCase()==='saltar'||v.toLowerCase()==='no'||v.toLowerCase()==='ninguna')) {
    newTask.notes='';
  } else {
    newTask[s.key]=v;
  }
  step++;
  askStep();
}

function finishTask() {
  const t = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,4),
    title: newTask.title||'Sin título',
    project: newTask.project||'',
    priority: newTask.priority||'media',
    date: newTask.date||'',
    notes: newTask.notes||'',
    done: false
  };
  tasks.push(t);
  saveTasks();
  renderHome();
  showTyping(()=>{
    addBubble(`¡Guardada! 🎯<br><span style="font-size:13px;opacity:.7">"${escHtml(t.title)}"${t.project?' → '+escHtml(t.project):''}</span>`,'success');
    renderOpts(['Agregar otra','Volver']);
    document.getElementById('text-inp').placeholder='';
    // Override opts for final step
    document.querySelectorAll('.qopt').forEach(b=>{
      b.onclick=()=>{
        if(b.textContent==='Agregar otra') {
          newTask={}; step=0;
          document.getElementById('convo').innerHTML='';
          askStep();
        } else { goHome(); }
      };
    });
  });
}

// ── VOICE ─────────────────────────────────────
function toggleVoice() { isRecording?stopRecording():startRecording(); }

function startRecording() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) { showToast('Dictado no disponible — escribí la tarea'); return; }
  recognition=new SR();
  recognition.lang='es-419';
  recognition.interimResults=false;
  recognition.onresult=e=>{
    const t=e.results[0][0].transcript;
    document.getElementById('text-inp').value=t;
    stopRecording();
    setTimeout(sendText,100);
  };
  recognition.onerror=()=>stopRecording();
  recognition.onend=()=>{ isRecording=false; document.getElementById('voice-btn').classList.remove('recording'); };
  recognition.start();
  isRecording=true;
  document.getElementById('voice-btn').classList.add('recording');
  showToast('Escuchando... hablá ahora');
}

function stopRecording() {
  if(recognition) recognition.stop();
  isRecording=false;
  document.getElementById('voice-btn').classList.remove('recording');
}

// ── TOAST ─────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────
loadTasks();
</script>
